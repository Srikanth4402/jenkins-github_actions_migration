name: CI/CD Pipeline

# ── WHEN DOES THIS WORKFLOW RUN? ─────────────────────────────
on:
  push:
    branches: [main]        # every push to main
  pull_request:
    branches: [main]        # every PR targeting main
  workflow_dispatch:        # manual "Run workflow" button in GitHub UI

# ── SHARED VARIABLES ─────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/calorie-tracker

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1: swagger
  # Previously: swagger-job in Jenkins
  # What it does: installs deps, lints, runs tests, validates openapi spec
  # Runs on: every push and PR
  # ════════════════════════════════════════════════════════════
  swagger:
    name: Swagger Validation & Tests
    runs-on: ubuntu-latest    # GitHub provides this machine for free

    steps:
      # Step 1 — Download the code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Node.js 20
      # No plugin needed — GitHub Actions has this built in
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: app

      # Step 4 — Lint
      - name: Lint
        run: npm run lint
        working-directory: app

      # Step 5 — Run tests
      - name: Run tests
        run: npm test
        working-directory: app

      # Step 6 — Upload coverage report
      # Available to download from the GitHub Actions UI
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

      # Step 7 — Validate OpenAPI spec
      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli@1.x lint openapi.yml
        working-directory: app

  # ════════════════════════════════════════════════════════════
  # JOB 2: cloudformation
  # Previously: cfn-job in Jenkins
  # What it does: builds Docker image, pushes to DockerHub,
  #               deploys CloudFormation stack
  # Runs on: ONLY after swagger job passes (needs: swagger)
  #           AND only on push to main (not on PRs)
  # ════════════════════════════════════════════════════════════
  cloudformation:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: swagger                          # waits for swagger job to pass
    if: github.event_name == 'push'         # skip on pull_request events

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to DockerHub using secrets stored in GitHub
      # Never hardcode credentials — always use secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push Docker image
      # github.sha = the unique commit hash — used as image tag
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Deploy CloudFormation stack
      # Uncomment when you have AWS credentials set up in GitHub Secrets
      # Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      #
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ap-south-1
      #
      # - name: Deploy CloudFormation stack
      #   run: |
      #     aws cloudformation deploy \
      #       --stack-name calorie-tracker-stack \
      #       --template-file infra/template.cfn.yml \
      #       --parameter-overrides \
      #           ImageTag=${{ github.sha }} \
      #           DockerHubUsername=${{ secrets.DOCKERHUB_USERNAME }} \
      #       --capabilities CAPABILITY_IAM \
      #       --no-fail-on-empty-changeset \
      #       --region ap-south-1

      - name: Deployment summary
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
